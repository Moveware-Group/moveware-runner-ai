<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositories - AI Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        h1 { color: #00d4ff; font-size: 1.8em; font-weight: 600; }
        .nav { display: flex; gap: 16px; }
        .nav a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.85em;
            padding: 5px 12px;
            border: 1px solid #333;
            border-radius: 4px;
            transition: border-color 0.2s;
        }
        .nav a:hover { border-color: #00d4ff; }

        .repo-grid {
            display: grid;
            gap: 16px;
        }
        .repo-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .repo-card:hover { border-color: #444; }
        .repo-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .repo-card-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .repo-key {
            background: #002233;
            color: #00d4ff;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }
        .repo-name {
            color: #fff;
            font-weight: 600;
            font-size: 1.1em;
        }
        .default-badge {
            background: #003311;
            color: #00ff88;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.7em;
            font-weight: 600;
            text-transform: uppercase;
        }
        .repo-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .field {
            font-size: 0.85em;
        }
        .field-label {
            color: #666;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }
        .field-value {
            color: #ccc;
            word-break: break-all;
        }
        .field-value.readonly {
            color: #888;
        }

        .field-input {
            width: 100%;
            padding: 6px 8px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 0.9em;
        }
        .field-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .field-input[readonly] {
            color: #666;
            cursor: not-allowed;
            border-color: #222;
        }

        .skills-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .skill-tag {
            background: #1a1a2e;
            border: 1px solid #333;
            color: #aa88ff;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75em;
        }

        .repo-card-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .edit-btn, .save-btn, .cancel-btn {
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            border: 1px solid;
            transition: all 0.2s;
        }
        .edit-btn {
            background: none;
            border-color: #444;
            color: #aaa;
        }
        .edit-btn:hover { border-color: #00d4ff; color: #00d4ff; }
        .save-btn {
            background: #00d4ff;
            border-color: #00d4ff;
            color: #000;
            font-weight: 600;
            display: none;
        }
        .save-btn:hover { background: #00a8cc; }
        .cancel-btn {
            background: none;
            border-color: #555;
            color: #888;
            display: none;
        }
        .cancel-btn:hover { border-color: #ff4444; color: #ff4444; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #0a2a1a; border: 1px solid #00ff88; color: #00ff88; }
        .toast.error { background: #2a1a1a; border: 1px solid #ff4444; color: #ff4444; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state p { margin-bottom: 16px; }
        .empty-state a {
            color: #00d4ff;
            text-decoration: none;
            border: 1px solid #00d4ff;
            padding: 8px 16px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Repositories</h1>
        <nav class="nav">
            <a href="/repos">+ Add Repository</a>
            <a href="/status">Dashboard</a>
        </nav>
    </div>

    <div class="repo-grid" id="repoGrid">
        <div class="empty-state"><p>Loading repositories...</p></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let allSkills = [];

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function renderRepos(projects, defaultKey) {
            const grid = document.getElementById('repoGrid');
            if (!projects || projects.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>No repositories configured yet.</p><a href="/repos">Add your first repository</a></div>';
                return;
            }
            grid.innerHTML = projects.map((p, idx) => {
                const isDefault = p.jira_project_key === defaultKey;
                const skillsHtml = (p.skills || []).map(s => `<span class="skill-tag">${s}</span>`).join('');
                const owner = p.repo_owner_slug || '';
                return `
                <div class="repo-card" data-idx="${idx}" data-key="${p.jira_project_key}">
                    <div class="repo-card-header">
                        <div class="repo-card-title">
                            <span class="repo-key">${p.jira_project_key}</span>
                            <span class="repo-name">${p.repo_owner_slug}/${p.repo_name}</span>
                            ${isDefault ? '<span class="default-badge">Default</span>' : ''}
                        </div>
                        <div class="repo-card-actions">
                            <button class="edit-btn" onclick="startEdit('${p.jira_project_key}')">Edit</button>
                            <button class="save-btn" id="save-${p.jira_project_key}" onclick="saveEdit('${p.jira_project_key}')">Save</button>
                            <button class="cancel-btn" id="cancel-${p.jira_project_key}" onclick="cancelEdit('${p.jira_project_key}')">Cancel</button>
                        </div>
                    </div>
                    <div class="repo-fields">
                        <div class="field">
                            <div class="field-label">Jira Project Name</div>
                            <div class="field-value view-mode" id="view-name-${p.jira_project_key}">${p.jira_project_name || '-'}</div>
                            <input class="field-input edit-mode" id="edit-name-${p.jira_project_key}" value="${(p.jira_project_name || '').replace(/"/g, '&quot;')}" style="display:none" />
                        </div>
                        <div class="field">
                            <div class="field-label">Repository</div>
                            <div class="field-value readonly">${owner}/${p.repo_name}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">SSH</div>
                            <div class="field-value readonly" style="font-size:0.8em">${p.repo_ssh || '-'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Base Branch</div>
                            <div class="field-value view-mode" id="view-branch-${p.jira_project_key}">${p.base_branch || 'main'}</div>
                            <input class="field-input edit-mode" id="edit-branch-${p.jira_project_key}" value="${p.base_branch || 'main'}" style="display:none" />
                        </div>
                        <div class="field">
                            <div class="field-label">Port</div>
                            <div class="field-value view-mode" id="view-port-${p.jira_project_key}">${p.port || 3000}</div>
                            <input class="field-input edit-mode" id="edit-port-${p.jira_project_key}" type="number" value="${p.port || 3000}" min="3000" max="65535" style="display:none" />
                        </div>
                        <div class="field">
                            <div class="field-label">Work Directory</div>
                            <div class="field-value readonly" style="font-size:0.8em">${p.repo_workdir || '-'}</div>
                        </div>
                        <div class="field" style="grid-column: 1 / -1">
                            <div class="field-label">Skills</div>
                            <div class="skills-display view-mode" id="view-skills-${p.jira_project_key}">
                                ${skillsHtml || '<span style="color:#555">None</span>'}
                            </div>
                            <select class="field-input edit-mode" id="edit-skills-${p.jira_project_key}" multiple style="display:none;height:80px">
                                ${allSkills.map(s => {
                                    const sel = (p.skills || []).includes(s.id) ? 'selected' : '';
                                    return `<option value="${s.id}" ${sel}>${s.id}</option>`;
                                }).join('')}
                            </select>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function startEdit(key) {
            const card = document.querySelector(`.repo-card[data-key="${key}"]`);
            card.querySelectorAll('.view-mode').forEach(el => el.style.display = 'none');
            card.querySelectorAll('.edit-mode').forEach(el => el.style.display = '');
            card.querySelector('.edit-btn').style.display = 'none';
            document.getElementById('save-' + key).style.display = '';
            document.getElementById('cancel-' + key).style.display = '';
        }

        function cancelEdit(key) {
            fetchRepos();
        }

        async function saveEdit(key) {
            const body = {
                jira_project_name: document.getElementById('edit-name-' + key).value.trim(),
                base_branch: document.getElementById('edit-branch-' + key).value.trim() || 'main',
                port: parseInt(document.getElementById('edit-port-' + key).value, 10) || 3000,
                skills: Array.from(document.getElementById('edit-skills-' + key).selectedOptions).map(o => o.value),
            };
            try {
                const res = await fetch('/api/repos/' + key, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (data.ok) {
                    showToast('Saved ' + key, 'success');
                    fetchRepos();
                } else {
                    showToast('Error: ' + (data.error || 'Unknown'), 'error');
                }
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
            }
        }

        async function fetchRepos() {
            try {
                const res = await fetch('/api/repos/list');
                const data = await res.json();
                renderRepos(data.projects, data.default_project_key);
            } catch (e) {
                document.getElementById('repoGrid').innerHTML = '<div class="empty-state"><p>Failed to load repositories.</p></div>';
            }
        }

        async function fetchSkills() {
            try {
                const res = await fetch('/api/repos/skills');
                const data = await res.json();
                allSkills = data.skills || [];
            } catch (e) {
                allSkills = [];
            }
        }

        (async () => {
            await fetchSkills();
            await fetchRepos();
        })();
    </script>
</body>
</html>
