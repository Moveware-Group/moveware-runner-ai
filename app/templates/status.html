<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Runner Status Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }
        
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding: 12px 0;
            border-bottom: 2px solid #333;
            background: #0a0a0a;
            flex-wrap: wrap;
        }

        .header-logo {
            height: 32px;
            width: auto;
            flex-shrink: 0;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        h1 {
            color: #00d4ff;
            font-size: 1.4em;
            font-weight: 600;
            white-space: nowrap;
            margin-right: 4px;
        }

        .header select, .header input[type="text"] {
            background: #111;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.82em;
            cursor: pointer;
        }
        .header input[type="text"] {
            width: 170px;
            cursor: text;
        }
        .header input[type="text"]:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .header input[type="text"]::placeholder { color: #555; }

        .header-spacer { flex: 1; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Dropdown menu */
        .menu-wrapper {
            position: relative;
        }
        .menu-btn {
            background: none;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.82em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.2s;
        }
        .menu-btn:hover { border-color: #00d4ff; color: #00d4ff; }
        .menu-btn svg { width: 14px; height: 14px; fill: currentColor; }
        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            min-width: 180px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 200;
            overflow: hidden;
        }
        .menu-dropdown.open { display: block; }
        .menu-dropdown a {
            display: block;
            padding: 10px 14px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.85em;
            transition: background 0.15s;
        }
        .menu-dropdown a:hover {
            background: #252525;
            color: #00d4ff;
        }
        .menu-dropdown .menu-sep {
            height: 1px;
            background: #333;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: 0.3s;
            border-radius: 30px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #00d4ff;
        }
        
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        
        .detail-label {
            color: #aaa;
            font-size: 0.9em;
        }
        
        .last-updated {
            color: #00d4ff;
            font-size: 0.85em;
        }
        
        .runs-container {
            display: grid;
            gap: 20px;
        }
        
        .run-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .run-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.1);
        }

        .run-card.is-active {
            border-color: #00d4ff;
        }

        .run-card.is-active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            width: 30%;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            animation: activeBar 1.8s ease-in-out infinite;
        }

        @keyframes activeBar {
            0%   { left: -30%; }
            100% { left: 100%; }
        }

        .active-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .run-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .run-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .run-summary {
            font-size: 0.85em;
            font-weight: 400;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            border-left: 2px solid #444;
            padding-left: 10px;
        }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-queued {
            background: #555;
            color: #ccc;
        }
        
        .status-running {
            background: #00d4ff;
            color: #000;
            animation: pulse 2s infinite;
        }
        
        .status-completed {
            background: #00ff88;
            color: #000;
        }
        
        .status-failed {
            background: #ff4444;
            color: #fff;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        
        .run-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: #0f0f0f;
            border-radius: 6px;
        }
        
        .meta-item {
            font-size: 0.9em;
        }
        
        .meta-label {
            color: #888;
            display: block;
            margin-bottom: 3px;
        }
        
        .meta-value {
            color: #fff;
            font-weight: 500;
        }
        
        .progress-section {
            margin-top: 15px;
        }
        
        .progress-title {
            color: #00d4ff;
            font-size: 1em;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .progress-event {
            padding: 12px;
            background: #0f0f0f;
            border-left: 3px solid #00d4ff;
            margin-bottom: 8px;
            border-radius: 4px;
        }
        
        .progress-event.stage-claimed {
            border-color: #888;
        }
        
        .progress-event.stage-analyzing {
            border-color: #ffaa00;
        }
        
        .progress-event.stage-planning {
            border-color: #aa00ff;
        }
        
        .progress-event.stage-executing {
            border-color: #00d4ff;
        }
        
        .progress-event.stage-committing {
            border-color: #0088ff;
        }
        
        .progress-event.stage-verifying {
            border-color: #ff8800;
        }
        
        .progress-event.stage-completed {
            border-color: #00ff88;
        }
        
        .progress-event.stage-failed {
            border-color: #ff4444;
        }

        .progress-event.stage-fixing {
            border-color: #ff6600;
            background: #1a0f00;
        }

        .progress-event.is-latest-active {
            background: #0d1a1f;
            border-left-width: 4px;
            animation: latestPulse 2.5s ease-in-out infinite;
        }

        @keyframes latestPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
            50%      { box-shadow: 0 0 8px 2px rgba(0, 212, 255, 0.15); }
        }
        
        .progress-stage {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 8px;
            letter-spacing: 0.5px;
        }

        .stage-claimed .progress-stage { background: #333; color: #aaa; }
        .stage-analyzing .progress-stage { background: #332200; color: #ffaa00; }
        .stage-planning .progress-stage { background: #220033; color: #cc66ff; }
        .stage-executing .progress-stage { background: #002233; color: #00d4ff; }
        .stage-committing .progress-stage { background: #001133; color: #4499ff; }
        .stage-verifying .progress-stage { background: #221100; color: #ff8800; }
        .stage-fixing .progress-stage { background: #331100; color: #ff6600; }
        .stage-completed .progress-stage { background: #003311; color: #00ff88; }
        .stage-failed .progress-stage { background: #330000; color: #ff4444; }
        
        .progress-message {
            color: #ccc;
            font-size: 0.95em;
        }

        .progress-message .msg-pass { color: #00ff88; }
        .progress-message .msg-fail { color: #ff4444; }
        .progress-message .msg-warn { color: #ffaa00; }
        
        .progress-meta {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 6px;
            background: #1a1a1a;
            border-radius: 3px;
            font-size: 0.75em;
            color: #888;
            font-family: monospace;
        }
        
        .progress-timestamp {
            color: #666;
            font-size: 0.8em;
            margin-top: 4px;
        }
        
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.1em;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
            font-size: 1.2em;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #333;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        /* Metrics Section */
        .metrics-section {
            margin-bottom: 30px;
            padding: 25px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
        }
        
        .metrics-title {
            font-size: 1.5em;
            color: #00d4ff;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .metric-card {
            background: #0f0f0f;
            padding: 20px;
            border-radius: 6px;
            border-left: 3px solid #00d4ff;
        }
        
        .metric-card.success {
            border-left-color: #00ff88;
        }
        
        .metric-card.cost {
            border-left-color: #ffaa00;
        }
        
        .metric-card.time {
            border-left-color: #aa00ff;
        }
        
        .metric-card.error {
            border-left-color: #ff4444;
        }
        
        .metric-label {
            color: #888;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .metric-value {
            color: #fff;
            font-size: 2em;
            font-weight: 700;
        }
        
        .metric-subtext {
            color: #666;
            font-size: 0.8em;
            margin-top: 5px;
        }
        
        .error-categories {
            margin-top: 20px;
            padding: 15px;
            background: #0f0f0f;
            border-radius: 6px;
        }
        
        .error-categories-title {
            color: #ff4444;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .error-tag {
            display: inline-block;
            padding: 4px 10px;
            background: #2a1a1a;
            border: 1px solid #ff4444;
            border-radius: 4px;
            color: #ff4444;
            font-size: 0.75em;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        
        .reset-btn {
            padding: 6px 12px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            color: #fff;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .reset-btn:hover {
            background: #444;
            border-color: #00d4ff;
            transform: scale(1.05);
        }
        
        .reset-btn-warning {
            background: #ff4444;
            border-color: #ff6666;
            animation: pulse-warning 2s infinite;
        }
        
        .reset-btn-warning:hover {
            background: #ff6666;
            border-color: #ff8888;
        }
        
        .reset-btn-running {
            padding: 6px 12px;
            background: #0066cc;
            border: 1px solid #00d4ff;
            border-radius: 4px;
            color: #fff;
            font-size: 0.85em;
            cursor: default;
            white-space: nowrap;
        }
        
        @keyframes pulse-warning {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        
        .reset-all-btn {
            padding: 8px 16px;
            background: #ff4444;
            border: 1px solid #ff6666;
            border-radius: 4px;
            color: #fff;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 20px;
            font-weight: 600;
            animation: pulse-warning 2s infinite;
        }
        
        .reset-all-btn:hover {
            background: #ff6666;
            border-color: #ff8888;
            transform: scale(1.05);
        }
        
        .delete-btn {
            padding: 6px 12px;
            background: #660000;
            border: 1px solid #880000;
            border-radius: 4px;
            color: #ff6666;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .delete-btn:hover {
            background: #880000;
            border-color: #aa0000;
            color: #ffaaaa;
            transform: scale(1.05);
        }
        
        .run-card.superseded {
            opacity: 0.4;
            border-left-color: #444;
        }
        
        .run-card.superseded:hover {
            opacity: 0.7;
        }
        
        .superseded-badge {
            display: inline-block;
            padding: 3px 8px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            color: #888;
            font-size: 0.75em;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="/static/moveware-logo.svg" alt="Moveware" class="header-logo" onerror="this.style.display='none'" />
        <div class="header-spacer"></div>
        <div class="header-center">
            <h1>AI Runner</h1>
            <button id="resetStuckBtn" class="reset-all-btn" onclick="resetAllStuckRuns()" style="display:none;">
                ⚠️ Reset Stuck
            </button>
            <input type="text" id="searchFilter" placeholder="Search runs..." />
            <select id="boardFilter">
                <option value="all" selected>All Boards</option>
            </select>
            <select id="statusFilter">
                <option value="all" selected>All Status</option>
                <option value="active">Active</option>
                <option value="failed">Failed / Stuck</option>
                <option value="completed">Completed</option>
                <option value="queued">Queued</option>
            </select>
            <select id="timeFilter">
                <option value="1">Last Hour</option>
                <option value="6">Last 6 Hours</option>
                <option value="12">Last 12 Hours</option>
                <option value="24" selected>Last 24 Hours</option>
                <option value="168">Last Week</option>
                <option value="all">All Time</option>
            </select>
        </div>
        <div class="header-spacer"></div>
        <div class="header-right">
            <span class="detail-label">Details</span>
            <label class="toggle-switch">
                <input type="checkbox" id="detailToggle" checked>
                <span class="slider"></span>
            </label>
            <div class="menu-wrapper">
                <button class="menu-btn" id="menuBtn" onclick="document.getElementById('menuDropdown').classList.toggle('open')">
                    <svg viewBox="0 0 20 20"><rect y="3" width="20" height="2" rx="1"/><rect y="9" width="20" height="2" rx="1"/><rect y="15" width="20" height="2" rx="1"/></svg>
                    Menu
                </button>
                <div class="menu-dropdown" id="menuDropdown">
                    <a href="/repos">+ Add Repository</a>
                    <a href="/repos/list">View Repositories</a>
                    <div class="menu-sep"></div>
                    <a href="/status">Dashboard</a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Metrics Section -->
    <div class="metrics-section" id="metricsSection">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px">
            <div class="metrics-title" style="margin-bottom:0">📊 Performance Metrics (Last 24h)</div>
            <span class="last-updated" id="lastUpdated">Loading...</span>
        </div>
        <div class="metrics-grid">
            <div class="metric-card success">
                <div class="metric-label">Success Rate</div>
                <div class="metric-value" id="successRate">--</div>
                <div class="metric-subtext" id="successSubtext">--</div>
            </div>
            
            <div class="metric-card cost">
                <div class="metric-label">Total Cost</div>
                <div class="metric-value" id="totalCost">--</div>
                <div class="metric-subtext">API usage (USD)</div>
            </div>
            
            <div class="metric-card time">
                <div class="metric-label">Avg Duration</div>
                <div class="metric-value" id="avgDuration">--</div>
                <div class="metric-subtext">per issue</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-label">Total Tokens</div>
                <div class="metric-value" id="totalTokens">--</div>
                <div class="metric-subtext" id="tokensSubtext">input + output</div>
            </div>
            
            <div class="metric-card" style="border-top:2px solid #aa00ff">
                <div class="metric-label">Knowledge Base</div>
                <div class="metric-value" id="kbLessons">--</div>
                <div class="metric-subtext" id="kbSubtext">lessons learned</div>
            </div>
        </div>
        
        <div id="errorCategoriesSection"></div>
    </div>
    
    <div id="runsContainer" class="runs-container">
        <div class="loading">
            <span class="spinner"></span>
            Loading runs...
        </div>
    </div>
    
    <script>
        let detailMode = 'detailed';
        let timeFilter = 24;
        let boardFilter = 'all';
        let statusFilter = 'all';
        let searchQuery = '';
        let configBoards = [];
        let autoRefreshInterval = null;
        const resettingRuns = new Set(); // Run IDs we just reset - show "Running" until complete/fail
        
        function formatTime(timestamp) {
            if (!timestamp) return 'N/A';
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString();
        }

        function formatProgressMessage(msg) {
            if (!msg) return '';
            return msg
                .replace(/^✓ /, '<span class="msg-pass">✓</span> ')
                .replace(/^✗ /, '<span class="msg-fail">✗</span> ')
                .replace(/^⚠ /, '<span class="msg-warn">⚠</span> ');
        }

        function formatProgressMeta(meta) {
            if (!meta || typeof meta !== 'object') return '';
            const parts = [];
            if (meta.cost) parts.push(`$${meta.cost}`);
            if (meta.tokens_in) parts.push(`${(meta.tokens_in/1000).toFixed(0)}k in`);
            if (meta.tokens_out) parts.push(`${(meta.tokens_out/1000).toFixed(0)}k out`);
            if (meta.duration_seconds) parts.push(`${(meta.duration_seconds/60).toFixed(1)}m`);
            if (meta.attempt) parts.push(`attempt ${meta.attempt}`);
            if (meta.past_fixes_found) parts.push(`${meta.past_fixes_found} past fixes`);
            if (meta.error_count) parts.push(`${meta.error_count} errors`);
            if (meta.pr_url) parts.push(`<a href="${meta.pr_url}" target="_blank" style="color:#4499ff">PR</a>`);
            if (parts.length === 0) return '';
            return `<span class="progress-meta">${parts.join(' · ')}</span>`;
        }
        
        // Format relative time (e.g., "2 minutes ago")
        function formatRelativeTime(timestamp) {
            if (!timestamp) return 'N/A';
            const now = Date.now() / 1000;
            const diff = now - timestamp;
            
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return `${Math.floor(diff / 86400)}d ago`;
        }
        
        async function fetchMetrics() {
            try {
                const hours = timeFilter === 'all' ? 999999 : timeFilter;
                const [metricsResp, kbResp] = await Promise.all([
                    fetch(`/api/metrics/summary?hours=${hours}`),
                    fetch(`/api/knowledge-base/stats`),
                ]);
                const data = await metricsResp.json();
                renderMetrics(data);

                const kb = await kbResp.json();
                const el = document.getElementById('kbLessons');
                const sub = document.getElementById('kbSubtext');
                if (el && kb && !kb.error) {
                    const totalKnowledge = (kb.total_lessons || 0) + (kb.error_patterns || 0) + (kb.type_corrections || 0) + (kb.file_patterns || 0);
                    el.textContent = totalKnowledge;
                    const prev = kb.total_prevented || 0;
                    const fixSuccess = kb.fix_attempts_successful || 0;
                    const fixTotal = kb.fix_attempts_total || 0;
                    const parts = [];
                    if (prev > 0) parts.push(`${prev} prevented`);
                    if (fixTotal > 0) parts.push(`${fixSuccess}/${fixTotal} fixes`);
                    if (kb.type_corrections > 0) parts.push(`${kb.type_corrections} type fixes`);
                    sub.textContent = parts.join(' · ') || 'building knowledge...';
                }
            } catch (error) {
                console.error('Failed to fetch metrics:', error);
            }
        }
        
        // Render metrics
        function renderMetrics(data) {
            const totalRuns = (data && data.total_runs) ?? 0;
            const completed = (data && data.completed) ?? 0;
            const failed = (data && data.failed) ?? 0;
            const successRate = (data && data.success_rate) ?? 0;
            const totalCostUsd = (data && data.total_cost_usd) ?? 0;
            const avgDurationSec = (data && data.avg_duration_seconds) ?? 0;
            const totalTokens = (data && data.total_tokens) ?? 0;
            
            // Update metrics title based on time filter
            let timeLabel = 'Last 24h';
            if (timeFilter === 1) timeLabel = 'Last Hour';
            else if (timeFilter === 6) timeLabel = 'Last 6h';
            else if (timeFilter === 12) timeLabel = 'Last 12h';
            else if (timeFilter === 24) timeLabel = 'Last 24h';
            else if (timeFilter === 168) timeLabel = 'Last Week';
            else if (timeFilter === 'all') timeLabel = 'All Time';
            
            document.querySelector('.metrics-title').textContent = `📊 Performance Metrics (${timeLabel})`;
            
            if (totalRuns === 0) {
                document.getElementById('successRate').textContent = '--';
                document.getElementById('successSubtext').textContent = 'No runs in period';
                document.getElementById('totalCost').textContent = '$0';
                document.getElementById('avgDuration').textContent = '--';
                document.getElementById('totalTokens').textContent = '0';
                document.getElementById('tokensSubtext').textContent = 'input + output';
                document.getElementById('errorCategoriesSection').innerHTML = '';
                return;
            }
            
            // Success rate
            document.getElementById('successRate').textContent = `${successRate}%`;
            document.getElementById('successSubtext').textContent = 
                `${completed} completed, ${failed} failed`;
            
            // Total cost
            document.getElementById('totalCost').textContent = `$${totalCostUsd}`;
            
            // Average duration
            const avgMin = Math.floor(avgDurationSec / 60);
            const avgSec = Math.floor(avgDurationSec % 60);
            document.getElementById('avgDuration').textContent = `${avgMin}m ${avgSec}s`;
            
            // Total tokens
            const tokensK = Math.round(totalTokens / 1000);
            document.getElementById('totalTokens').textContent = `${tokensK}K`;
            document.getElementById('tokensSubtext').textContent = 
                `${totalRuns} runs processed`;
            
            // Error categories
            if (data.error_categories && Object.keys(data.error_categories).length > 0) {
                const errorHtml = `
                    <div class="error-categories">
                        <div class="error-categories-title">⚠️ Recent Error Categories</div>
                        ${Object.entries(data.error_categories).map(([category, count]) => 
                            `<span class="error-tag">${category}: ${count}</span>`
                        ).join('')}
                    </div>
                `;
                document.getElementById('errorCategoriesSection').innerHTML = errorHtml;
            }
        }
        
        // Fetch and render status
        async function fetchStatus() {
            try {
                const hours = timeFilter === 'all' ? 'all' : timeFilter;
                const response = await fetch(`/api/status?detail=${detailMode}&hours=${hours}`);
                const data = await response.json();
                
                renderRuns(data.runs);
                
                document.getElementById('lastUpdated').textContent = 
                    `Updated: ${formatTime(data.timestamp)}`;
            } catch (error) {
                console.error('Failed to fetch status:', error);
                document.getElementById('runsContainer').innerHTML = 
                    '<div class="no-data">Failed to load data. Check console for errors.</div>';
            }
        }
        
        let _lastRuns = [];
        function renderRuns(runs) {
            if (runs !== undefined) _lastRuns = runs;
            else runs = _lastRuns;
            const container = document.getElementById('runsContainer');
            
            if (!runs || runs.length === 0) {
                container.innerHTML = '<div class="no-data">No recent runs found.</div>';
                document.getElementById('resetStuckBtn').style.display = 'none';
                return;
            }
            
            // Normalize issue_key for case-insensitive comparison
            const norm = (k) => (k || '').toString().toUpperCase().trim();
            
            // Extract board prefix from issue key (e.g., TB-23 → TB, OD-48 → OD)
            const getBoard = (issueKey) => {
                const match = issueKey.match(/^([A-Z]+)-/);
                return match ? match[1] : 'OTHER';
            };
            
            // Identify superseded failed runs (for stuck run calculation)
            const supersededRuns = new Set();
            runs.forEach(run => {
                if (run.status === 'failed') {
                    const hasNewerSuccess = runs.some(otherRun =>
                        otherRun.run_id > run.run_id &&
                        norm(otherRun.issue_key) === norm(run.issue_key) &&
                        otherRun.status === 'completed'
                    );
                    if (hasNewerSuccess) {
                        supersededRuns.add(run.run_id);
                    }
                }
            });
            
            // Use boards from repos.json; merge with boards from runs (legacy projects)
            const boardsFromRuns = new Set();
            runs.forEach(run => {
                const board = getBoard(run.issue_key);
                if (board !== 'OTHER') boardsFromRuns.add(board);
            });
            const boards = [...new Set([...configBoards, ...boardsFromRuns])].sort();
            
            // Update board filter dropdown (only if changed)
            const boardFilterEl = document.getElementById('boardFilter');
            const currentOptions = Array.from(boardFilterEl.options).map(o => o.value).join(',');
            const newOptions = ['all', ...boards].join(',');
            if (currentOptions !== newOptions) {
                const currentValue = boardFilter;
                boardFilterEl.innerHTML = '<option value="all">All Boards</option>' +
                    boards.map(board => `<option value="${board}">${board}</option>`).join('');
                const validValue = (currentValue === 'all' || boards.includes(currentValue)) ? currentValue : 'all';
                boardFilterEl.value = validValue;
                boardFilter = validValue;
            }
            
            let filteredRuns = boardFilter === 'all'
                ? runs
                : runs.filter(run => getBoard(run.issue_key) === boardFilter);

            if (statusFilter === 'active') {
                filteredRuns = filteredRuns.filter(r => ['running', 'claimed'].includes(r.status));
            } else if (statusFilter === 'failed') {
                filteredRuns = filteredRuns.filter(r => r.status === 'failed' || (
                    ['running', 'claimed'].includes(r.status) && r.created_at && (Date.now()/1000 - r.created_at) > 300
                ));
            } else if (statusFilter === 'completed') {
                filteredRuns = filteredRuns.filter(r => r.status === 'completed');
            } else if (statusFilter === 'queued') {
                filteredRuns = filteredRuns.filter(r => r.status === 'queued');
            }

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filteredRuns = filteredRuns.filter(r => {
                    const key = (r.issue_key || '').toLowerCase();
                    const summary = (r.summary || '').toLowerCase();
                    const worker = (r.worker_id || '').toLowerCase();
                    const id = String(r.id || '');
                    return key.includes(q) || summary.includes(q) || worker.includes(q) || id.includes(q);
                });
            }

            if (filteredRuns.length === 0) {
                let label = 'current filters';
                if (searchQuery) label = `"${searchQuery}"`;
                else if (statusFilter !== 'all') label = `status: ${statusFilter}`;
                else if (boardFilter !== 'all') label = `board: ${boardFilter}`;
                container.innerHTML = `<div class="no-data">No runs found for ${label}</div>`;
                document.getElementById('resetStuckBtn').style.display = 'none';
                return;
            }
            
            // Check if any runs are stuck (excluding superseded failed runs):
            // - claimed/running for >5 min without progress
            // - failed (but NOT superseded) - needs manual intervention
            const now = Date.now() / 1000;
            const stuckRuns = filteredRuns.filter(run => {
                // Skip superseded failed runs - they're not actually stuck
                if (supersededRuns.has(run.run_id)) {
                    console.log(`Run ${run.issue_key} (${run.run_id}) is superseded - not stuck`);
                    return false;
                }
                
                // Failed runs (not superseded) are considered stuck
                if (run.status === 'failed') {
                    console.log(`Run ${run.issue_key} (${run.run_id}) is stuck: FAILED`);
                    return true;
                }
                
                // Claimed/running runs are stuck if they've been in that state for >5 min
                if (run.status !== 'claimed' && run.status !== 'running') return false;
                
                // CRITICAL: If locked_at is missing on a claimed/running run, don't immediately
                // consider it stuck - give it grace period. This handles the race condition where
                // a run was just claimed but the next poll happens before locked_at propagates.
                if (!run.locked_at) {
                    console.log(`Run ${run.issue_key} (${run.run_id}) is ${run.status} but locked_at is NULL - assuming just claimed, not stuck yet`);
                    return false;  // Don't consider stuck if locked_at is missing
                }
                
                const claimDuration = now - run.locked_at;
                const isStuckTime = claimDuration > 300;
                
                if (isStuckTime) {
                    console.log(`Run ${run.issue_key} (${run.run_id}) is stuck: ${run.status} for ${Math.floor(claimDuration/60)}min (locked_at: ${run.locked_at}, now: ${now})`);
                } else {
                    console.log(`Run ${run.issue_key} (${run.run_id}) is NOT stuck: ${run.status} for ${Math.floor(claimDuration)}s`);
                }
                
                return isStuckTime;
            });
            
            // Show/hide "Reset All Stuck" button
            const resetStuckBtn = document.getElementById('resetStuckBtn');
            if (stuckRuns.length > 0) {
                resetStuckBtn.style.display = 'block';
                resetStuckBtn.textContent = `⚠️ Reset ${stuckRuns.length} Stuck Run${stuckRuns.length > 1 ? 's' : ''}`;
            } else {
                resetStuckBtn.style.display = 'none';
            }
            
            // Clean up resettingRuns: remove runs that have completed or failed
            runs.forEach(run => {
                if ((run.status === 'completed' || run.status === 'failed') && resettingRuns.has(run.run_id)) {
                    resettingRuns.delete(run.run_id);
                }
            });

            // Sort: recently-reset first, then active, then by recency
            filteredRuns.sort((a, b) => {
                const aReset = resettingRuns.has(a.run_id) ? 1 : 0;
                const bReset = resettingRuns.has(b.run_id) ? 1 : 0;
                if (aReset !== bReset) return bReset - aReset;
                const activeStates = ['running', 'claimed', 'queued'];
                const aActive = activeStates.includes(a.status) ? 1 : 0;
                const bActive = activeStates.includes(b.status) ? 1 : 0;
                if (aActive !== bActive) return bActive - aActive;
                return (b.updated_at || b.created_at || 0) - (a.updated_at || a.created_at || 0);
            });

            container.innerHTML = filteredRuns.map(run => {
                const isSuperseded = supersededRuns.has(run.run_id);
                const statusClass = `status-${run.status}`;
                const latestProgress = run.progress_events[0];
                
                let progressHtml = '';
                if (run.progress_events && run.progress_events.length > 0) {
                    const isRunActive = ['running', 'claimed'].includes(run.status);
                    progressHtml = `
                        <div class="progress-section">
                            <div class="progress-title">Progress</div>
                            ${run.progress_events.map((event, idx) => {
                                const isLatest = idx === 0 && isRunActive;
                                return `
                                <div class="progress-event stage-${event.stage} ${isLatest ? 'is-latest-active' : ''}">
                                    ${isLatest ? '<span class="active-spinner"></span>' : ''}
                                    <span class="progress-stage">${event.stage}</span>
                                    <span class="progress-message">${formatProgressMessage(event.message)}</span>
                                    ${formatProgressMeta(event.meta)}
                                    <div class="progress-timestamp">${formatTime(event.timestamp)}</div>
                                </div>
                            `}).join('')}
                        </div>
                    `;
                }
                
                // Check if run appears stuck
                // - failed runs are always stuck (need intervention)
                // - claimed/running for more than 5 minutes without progress
                const now = Date.now() / 1000;
                let isStuck = false;
                
                if (run.status === 'failed') {
                    isStuck = true;
                } else if (run.status === 'claimed' || run.status === 'running') {
                    // Only consider stuck if locked_at exists and is > 5 min ago
                    // If locked_at is null, assume just claimed (race condition)
                    if (run.locked_at) {
                        const claimDuration = now - run.locked_at;
                        isStuck = claimDuration > 300;
                    }
                }
                const isResetting = resettingRuns.has(run.run_id);
                
                // After reset: show blue "Running..." until complete/fail. Otherwise show Reset for failed/claimed/running.
                // Don't show Reset on failed runs when another run for same task is active (queued/claimed/running).
                const hasActiveRunForSameTask = run.status === 'failed' && runs.some(r =>
                    r.run_id !== run.run_id &&
                    norm(r.issue_key) === norm(run.issue_key) &&
                    ['queued', 'claimed', 'running'].includes(r.status)
                );
                let actionButtons = '';
                if (isResetting && run.status !== 'completed' && run.status !== 'failed') {
                    actionButtons = `<span class="reset-btn-running">Running...</span>`;
                } else if (hasActiveRunForSameTask) {
                    actionButtons = '';  // Failed run but another run for this task is active - no buttons
                } else if (run.status === 'failed') {
                    // Failed runs get both Reset and Delete buttons
                    actionButtons = `
                        <button class="reset-btn ${isStuck ? 'reset-btn-warning' : ''}" 
                                onclick="resetRun(${run.run_id}, '${run.issue_key}')"
                                title="${isStuck ? 'Run appears stuck - click to reset' : 'Reset this run'}">
                            ${isStuck ? '⚠️ Reset' : '🔄 Reset'}
                        </button>
                        <button class="delete-btn" 
                                onclick="deleteRun(${run.run_id}, '${run.issue_key}')"
                                title="Permanently delete this failed run">
                            🗑️ Delete
                        </button>
                    `;
                } else if (run.status === 'claimed' || run.status === 'running') {
                    // Claimed/running runs only get Reset
                    actionButtons = `
                        <button class="reset-btn ${isStuck ? 'reset-btn-warning' : ''}" 
                                onclick="resetRun(${run.run_id}, '${run.issue_key}')"
                                title="${isStuck ? 'Run appears stuck - click to reset' : 'Reset this run'}">
                            ${isStuck ? '⚠️ Reset' : '🔄 Reset'}
                        </button>
                    `;
                }
                
                const isActive = ['running', 'claimed'].includes(run.status);

                return `
                    <div class="run-card ${isSuperseded ? 'superseded' : ''} ${isActive ? 'is-active' : ''}">
                        <div class="run-header">
                            <div class="run-title">
                                ${isActive ? '<span class="active-spinner"></span>' : ''}
                                <span style="flex-shrink:0">${run.issue_key}</span>
                                ${run.summary ? `<span class="run-summary" title="${run.summary.replace(/"/g, '&quot;')}">${run.summary}</span>` : ''}
                                ${isSuperseded ? '<span class="superseded-badge" title="This failed run was superseded by a newer successful run">Superseded ✓</span>' : ''}
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <div class="status-badge ${statusClass}">${run.status}</div>
                                ${actionButtons}
                            </div>
                        </div>
                        
                        <div class="run-meta">
                            <div class="meta-item">
                                <span class="meta-label">Run ID</span>
                                <span class="meta-value">#${run.run_id}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Started</span>
                                <span class="meta-value">${formatRelativeTime(run.created_at)}</span>
                            </div>
                            ${run.completed_at ? `
                                <div class="meta-item">
                                    <span class="meta-label">Completed</span>
                                    <span class="meta-value">${formatRelativeTime(run.completed_at)}</span>
                                </div>
                            ` : ''}
                            ${run.locked_by ? `
                                <div class="meta-item">
                                    <span class="meta-label">Worker</span>
                                    <span class="meta-value">${run.locked_by}</span>
                                </div>
                            ` : ''}
                        </div>
                        
                        ${progressHtml}
                    </div>
                `;
            }).join('');
        }
        
        // Reset a stuck run
        async function resetRun(runId, issueKey) {
            if (!confirm(`Reset run #${runId} (${issueKey})?\n\nThis will:\n- Reset status to 'queued'\n- Clear worker lock\n- Allow the run to be retried\n\nContinue?`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/runs/${runId}/retry`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.ok || response.ok) {
                    resettingRuns.add(runId);
                    fetchStatus();
                } else {
                    alert(`❌ Failed to reset run: ${data.error || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Failed to reset run:', error);
                alert(`❌ Failed to reset run: ${error.message}`);
            }
        }
        
        // Delete a failed run
        async function deleteRun(runId, issueKey) {
            if (!confirm(`⚠️ DELETE run #${runId} (${issueKey})?\n\nThis will:\n- Permanently delete the run record\n- Delete all associated events and metrics\n- This action CANNOT be undone\n\nContinue?`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/runs/${runId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (data.ok || response.ok) {
                    // Refresh the status immediately
                    fetchStatus();
                    fetchMetrics(); // Also refresh metrics since run count changed
                } else {
                    alert(`❌ Failed to delete run: ${data.error || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Failed to delete run:', error);
                alert(`❌ Failed to delete run: ${error.message}`);
            }
        }
        
        // Reset all stuck runs
        async function resetAllStuckRuns() {
            // Get current runs
            const response = await fetch(`/api/status?detail=summary&hours=${timeFilter === 'all' ? 999999 : timeFilter}`);
            const data = await response.json();
            const runs = data.runs || [];
            
            // Normalize issue_key
            const norm = (k) => (k || '').toString().toUpperCase().trim();
            
            // Identify superseded failed runs
            const supersededRuns = new Set();
            runs.forEach(run => {
                if (run.status === 'failed') {
                    const hasNewerSuccess = runs.some(otherRun =>
                        otherRun.run_id > run.run_id &&
                        norm(otherRun.issue_key) === norm(run.issue_key) &&
                        otherRun.status === 'completed'
                    );
                    if (hasNewerSuccess) {
                        supersededRuns.add(run.run_id);
                    }
                }
            });
            
            // Find stuck runs (excluding superseded)
            const now = Date.now() / 1000;
            const stuckRuns = runs.filter(run => {
                // Skip superseded runs
                if (supersededRuns.has(run.run_id)) {
                    return false;
                }
                
                // Failed runs are stuck
                if (run.status === 'failed') {
                    return true;
                }
                
                // Claimed/running runs stuck if >5 min
                if (run.status === 'claimed' || run.status === 'running') {
                    const runningTime = run.locked_at ? (now - run.locked_at) : (now - run.created_at);
                    return runningTime > 300;
                }
                
                return false;
            });
            
            if (stuckRuns.length === 0) {
                alert('No stuck runs found.');
                return;
            }
            
            const runList = stuckRuns.map(r => `- ${r.issue_key} (Run #${r.run_id})`).join('\n');
            
            if (!confirm(`Reset ${stuckRuns.length} stuck run(s)?\n\n${runList}\n\nThis will reset all of them to 'queued' status.\n\nContinue?`)) {
                return;
            }
            
            let successCount = 0;
            let failCount = 0;
            
            for (const run of stuckRuns) {
                try {
                    const response = await fetch(`/api/runs/${run.run_id}/retry`, {
                        method: 'POST'
                    });
                    const data = await response.json();
                    
                    if (data.ok || response.ok) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                } catch (error) {
                    console.error(`Failed to reset run ${run.run_id}:`, error);
                    failCount++;
                }
            }
            
            alert(`Reset complete!\n\n✅ Successfully reset: ${successCount}\n❌ Failed: ${failCount}`);
            
            // Refresh the status
            fetchStatus();
        }
        
        document.getElementById('detailToggle').addEventListener('change', (e) => {
            detailMode = e.target.checked ? 'detailed' : 'summary';
            fetchStatus();
        });

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menuDropdown');
            if (menu && !e.target.closest('.menu-wrapper')) menu.classList.remove('open');
        });

        document.getElementById('boardFilter').addEventListener('change', (e) => {
            boardFilter = e.target.value;
            fetchStatus();
        });

        document.getElementById('statusFilter').addEventListener('change', (e) => {
            statusFilter = e.target.value;
            fetchStatus();
        });

        let searchDebounce = null;
        document.getElementById('searchFilter').addEventListener('input', (e) => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => {
                searchQuery = e.target.value.trim();
                renderRuns();
            }, 250);
        });
        
        // Time filter change
        document.getElementById('timeFilter').addEventListener('change', (e) => {
            const value = e.target.value;
            timeFilter = value === 'all' ? 'all' : parseInt(value);
            fetchStatus();
            fetchMetrics();
        });
        
        // Fetch boards from repos.json for Board dropdown
        async function fetchBoards() {
            try {
                const resp = await fetch('/api/repos/boards');
                const data = await resp.json();
                configBoards = (data.boards || []).filter(Boolean);
            } catch (e) {
                console.warn('Could not fetch boards:', e);
            }
        }
        
        // Auto-refresh every 5 seconds
        async function startAutoRefresh() {
            await fetchBoards(); // Load all repos from JSON before first render
            fetchStatus(); // Initial fetch
            fetchMetrics(); // Initial metrics fetch
            autoRefreshInterval = setInterval(() => {
                fetchStatus();
                fetchMetrics();
            }, 5000);
        }
        
        // Start when page loads
        startAutoRefresh();
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        });
    </script>
</body>
