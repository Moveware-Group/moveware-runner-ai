# Example nginx server block for a Next.js app (Node upstream).
# Copy to /etc/nginx/sites-available/<app> and enable the site.
# Replace MYAPP and 3000 with your app name and port.

# Upstream for the Node/Next.js process
upstream myapp_node {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name myapp.example.com;

    # Redirect HTTP to HTTPS (uncomment when TLS is ready)
    # return 301 https://$server_name$request_uri;
    # }
    # server {
    # listen 443 ssl http2;
    # server_name myapp.example.com;
    # ssl_certificate     /etc/letsencrypt/live/myapp.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/myapp.example.com/privkey.pem;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_pass http://myapp_node;
    }
}
